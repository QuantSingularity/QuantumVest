version: "3.9"

services:
  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: quantumvest_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: quantumvest
      POSTGRES_USER: quantumvest
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quantumvest_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantumvest -d quantumvest"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quantumvest_network

  # ─── Redis Cache & Message Broker ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: quantumvest_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--pass",
          "${REDIS_PASSWORD:-redis_secure_password}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quantumvest_network

  # ─── Flask Backend API ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantumvest_backend
    restart: unless-stopped
    environment:
      FLASK_ENV: docker
      DATABASE_URL: postgresql://quantumvest:${DB_PASSWORD:-quantumvest_secure_password}@db:5432/quantumvest
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-different-from-secret-key}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ENABLE_PORTFOLIO_OPTIMIZATION: "true"
      ENABLE_REAL_TIME_DATA: "true"
      ENABLE_ADVANCED_ANALYTICS: "true"
      ENABLE_BLOCKCHAIN_FEATURES: "false"
      MAX_LOGIN_ATTEMPTS: "5"
      ACCOUNT_LOCKOUT_MINUTES: "30"
      LOG_LEVEL: INFO
    volumes:
      - model_data:/app/resources/models
      - market_data:/app/resources/data
      - cache_data:/app/resources/data_cache
      - app_logs:/app/logs
      - uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - quantumvest_network

  # ─── Celery Worker (Background Tasks) ────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantumvest_celery
    restart: unless-stopped
    command: celery -A app.celery worker --loglevel=info --concurrency=2
    environment:
      FLASK_ENV: docker
      DATABASE_URL: postgresql://quantumvest:${DB_PASSWORD:-quantumvest_secure_password}@db:5432/quantumvest
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
    volumes:
      - model_data:/app/resources/models
      - market_data:/app/resources/data
      - cache_data:/app/resources/data_cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quantumvest_network
    profiles:
      - full

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: quantumvest_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - quantumvest_network
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  model_data:
    driver: local
  market_data:
    driver: local
  cache_data:
    driver: local
  app_logs:
    driver: local
  uploads:
    driver: local

networks:
  quantumvest_network:
    driver: bridge
